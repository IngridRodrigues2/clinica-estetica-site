<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="estilo.css">
    <title>Agendar Consulta</title>
    <meta charset="UTF-8">
</head>

<body>

<div class="container">

    <div class="lado-imagem"></div>

    <div class="lado-form">
        <div class="card">

            <h2>Agendamento</h2>

            <!-- FORMULÁRIO CORRETO -->
            <form id="formAgendamento">

                <label>Nome Completo</label>
                <input type="text" id="nome" required>

                <label>Data de Nascimento</label>
                <input type="date" id="nascimento" required>

                <label>Telefone</label>
                <input type="text" id="telefone" required>

                <label>Email</label>
                <input type="email" id="email" required>

                <label>Cidade</label>
                <input type="text" id="cidade" required>

                <label>Data Desejada da Consulta</label>
                <input type="date" id="data_consulta" required>

                <button type="submit">Confirmar Agendamento</button>

            </form>

            <button type="button" class="voltar"
                onclick="window.location.href='index.html'">
                Voltar
            </button>

        </div>
    </div>

</div>

<script>
    const form = document.getElementById("formAgendamento");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const dados = {
            nome: document.getElementById("nome").value,
            nascimento: document.getElementById("nascimento").value,
            telefone: document.getElementById("telefone").value,
            email: document.getElementById("email").value,
            cidade: document.getElementById("cidade").value,
            data_consulta: document.getElementById("data_consulta").value
        };

        try {
            const resposta = await fetch("/agendar", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(dados)
            });

            const resultado = await resposta.json();

            if (resultado.sucesso) {
                alert("Agendamento realizado com sucesso!");
                form.reset();
            } else {
                alert("Erro ao agendar.");
            }

        } catch (erro) {
            alert("Erro ao conectar com o servidor.");
            console.error(erro);
        }
    });
</script>

</body>
</html>
